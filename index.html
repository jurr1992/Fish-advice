<!DOCTYPE html>
<html>
<head>
  <title>Fishing Advisor</title>
</head>
<body>

<h1>Fishing Advice:</h1>

<label>Location (State):</label>
<input type="text" id="state" placeholder="e.g. Maryland">

<label>Water type:</label>
<select id="waterType">
  <option>Pond</option>
  <option>Small Lake</option>
  <option>Large Lake</option>
  <option>Creek</option>
  <option>Small River</option>
  <option>Large River</option>
  <option>Sea/Ocean</option>
</select>

<label>Fishing Spot:</label>
<select id="spot">
  <option>Shore</option>
  <option>Wading</option>
  <option>Boat/Kayak</option>
</select>

<label>Time of Day:</label>
<select id="time">
  <option>Early Morning</option>
  <option>Mid Morning</option>
  <option>Noon</option>
  <option>Early Afternoon</option>
  <option>Late Afternoon</option>
  <option>Evening</option>
  <option>Night</option>
</select>

<label>Season:</label>
<select id="season">
  <option>Winter</option>
  <option>Spring</option>
  <option>Summer</option>
  <option>Fall</option>
</select>
  
<label>Weather:</label>
<select id="weather">
  <option>Sunny</option>
  <option>Partially cloudy</option>
  <option>Cloudy</option>
  <option>Overcast</option>
  <option>Rainy</option>
  <option>Snowy</option>
</select>

<label>Target Fish:</label>
<select id="fish">
  <option>Largemouth Bass</option>
  <option>Smallmouth Bass</option>
  <option>Catfish</option>
  <option>Sunfish</option>
  <option>Brown Trout</option>
  <option>Rainbow Trout</option>
</select>

<button onclick="getAdvice()">Get Advice</button>

<h2>Recommended Lure:</h2>
<p id="lure"></p>

<h2>Recommended Bait:</h2>
<p id="bait"></p>

<h2>Other Bait / Lure Options:</h2>
<p id="otherLures"></p>

<h2>Recommended Action:</h2>
<p id="action"></p>

<h2>Recommended Location:</h2>
<p id="locationAdvice"></p>

<h2>Other Advice:</h2>
<p id="otherAdvice"></p>

<script src="script.js"></script>
</body>
</html>
